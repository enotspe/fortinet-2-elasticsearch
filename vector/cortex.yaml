# Change this to use a non-default directory for Vector data storage:
# data_dir: "/var/lib/vector"

# Random Syslog-formatted logs
sources:
  syslog_cortex:
    type: "syslog"
    address: 0.0.0.0:${CORTEX_SYSLOG_UDP_PORT:-5191}
    mode: "udp"
    #type: "socket"
    #address: 0.0.0.0:${CORTEX_SYSLOG_UDP_PORT:-5191}
    #mode: "udp"

# https://documentation.securonix.com/bundle/securonix-cloud-user-guide/page/content/data-dictionary/mapping-by-parser/detailed-mapping-for-palo-alto-cortex-xdr-syslog.htm
transforms:
  remap_cortex:
    type: "remap"
    inputs: ["syslog_cortex"]
    source: |
      # Rename syslog fields from "."
      .log.syslog.facility.name = del(.facility)
      .log.source.address = del(.source_ip)
      .log.syslog.hostname = del(.hostname)
      .log.syslog.host = del(.host)
      .log.syslog.severity.name = del(.severity)
      .log.syslog.version = del(.version)
      .log.logger = del(.source_type)
      .log.syslog.procid = del(.procid)
      .log.syslog.appname = del(.appname)

      # For Elasticsearch
      #.@timestamp = del(.timestamp) # not necessary https://vector.dev/docs/reference/configuration/sinks/elasticsearch/#mode

      .observer.product = "Cortex"
      .observer.type = "EDR"
      .observer.vendor = "Palo Alto"
      .observer.hostname = .log.syslog.hostname
      .observer.name = .log.syslog.host

      # Parse
      .cortex = parse_cef(.message) ?? {}

      .source.ip = .cortex.src
      .host.ip = .cortex.src
      .source.port = .cortex.spt
      .host.name = .cortex.shost
      .host.user.name = .cortex.suser
      .file.path = .cortex.filePath
      .file.hash.sha256 = .cortex.fileHash
      .threat.tactic.name = .cortex.mitreTactic
      .event.action = .cortex.act

      .cortex |= object_from_array([ [.cs1Label, .cs1],  [.cs2Label, .cs2],   [.cs3Label, .cs3],  [.cs4Label, .cs4],  [.cs5Label, .cs5],  [.cs6Label, .cs6] ])
      .cortex |= object_from_array([ [.fs1Label, .fs1],  [.fs2Label, .fs2] ])

      # delete null fields
      . = compact(.)

sinks:
  #  print:
  #   type: "console"
  #   inputs: ["remap_fortimail"]
